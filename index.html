<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;overscroll-behavior:none;padding-bottom:70px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
input,button,textarea,select{font-family:inherit}
@keyframes sd{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes cf{0%{top:-10px;opacity:1}100%{top:110vh;opacity:0;transform:rotate(720deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bounceCheck{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes splashIn{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
@keyframes appOpen{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:scale(1)}}
.tdot{animation:blink 1.4s infinite;display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 2px}
.bounce{animation:bounceCheck .3s ease}
.bNav{position:fixed;bottom:0;left:0;right:0;background:#FFF;border-top:1px solid #E8E0D8;display:flex;justify-content:space-around;padding:6px 0 8px;z-index:200;max-width:480px;margin:0 auto}
.bNav.dk{background:#1A1A1A;border-color:#333}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 6px;position:relative}
.nb .ic{font-size:20px}.nb.a .ic{transform:scale(1.15)}
.nb .lb{font-size:9px;font-weight:600;color:#AAA}.nb.a .lb{font-weight:800}
.nb .dt{width:4px;height:4px;border-radius:50%;position:absolute;bottom:2px;opacity:0}.nb.a .dt{opacity:1}
.nbg{position:absolute;top:0;right:2px;background:#E53935;color:#FFF;font-size:8px;font-weight:800;padding:1px 4px;border-radius:10px}
</style>
