*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito','Segoe UI',sans-serif;overscroll-behavior:none;padding-bottom:70px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
input,button,textarea,select{font-family:inherit}
@keyframes sd{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes cf{0%{top:-10px;opacity:1;transform:rotate(0)}100%{top:110vh;opacity:0;transform:rotate(720deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bounceCheck{0%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes splashIn{0%{opacity:0;transform:scale(.7)}50%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
@keyframes appOpen{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:scale(1)}}
.tdot{animation:blink 1.4s infinite;display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 2px}
.bounce{animation:bounceCheck .3s ease}
.bottomNav{position:fixed;bottom:0;left:0;right:0;background:#FFF;border-top:1px solid #E8E0D8;display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,8px);z-index:200;max-width:480px;margin:0 auto}
.bottomNav.dark{background:#1A1A1A;border-color:#333}
.navBtn{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 8px;position:relative;min-width:44px}
.navBtn .icon{font-size:20px;transition:transform .2s}
.navBtn.active .icon{transform:scale(1.15)}
.navBtn .label{font-size:9px;font-weight:600;color:#AAA;transition:color .2s}
.navBtn.active .label{font-weight:800}
.navBtn .dot{width:4px;height:4px;border-radius:50%;position:absolute;bottom:2px;opacity:0;transition:opacity .2s}
.navBtn.active .dot{opacity:1}
.navBadge{position:absolute;top:0;right:4px;background:#E53935;color:#FFF;font-size:8px;font-weight:800;padding:1px 4px;border-radius:10px;min-width:14px;text-align:center}
